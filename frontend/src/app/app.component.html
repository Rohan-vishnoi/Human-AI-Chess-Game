<div class="game-container">
  <h1>🧠 Human vs AI Chess</h1>

  @if (gameState === 'WELCOME') {
    <div class="welcome-card">
      <h2>Welcome, Challenger!</h2>
      <div class="input-group">
        <label>Enter your name:</label>
        <input type="text" [(ngModel)]="playerName" placeholder="e.g. Rohan">
      </div>
      <div class="input-group">
        <label>Choose your color:</label>
        <select [(ngModel)]="playerColor">
          <option value="WHITE">White</option>
          <option value="BLACK">Black</option>
        </select>
      </div>
      <button class="start-btn" (click)="startGame()">Start Game</button>
    </div>
  }

  @if (gameState === 'PLAYING' || gameState === 'GAME_OVER') {
    <div class="board-container">
      <div class="player-info">
        <p>Player: <strong>{{ playerName }}</strong></p>
        <p>Playing as: <strong>{{ playerColor }}</strong></p>
      </div>

      <div class="ai-status" [class.thinking]="isAiThinking">
        @if (isAiThinking) {
          <span>🧠 Gemini is thinking about its next move...</span>
        } @else {
          <span>Your turn!</span>
        }
      </div>

      <div #boardRef class="cg-board-wrap" style="width: 500px; height: 500px; display: block;" [class.disabled-board]="isAiThinking || gameState === 'GAME_OVER'"></div>
      <button class="reset-btn" (click)="resetGame()">Resign / Quit</button>
    </div>
  }
</div>
